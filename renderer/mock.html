<!DOCTYPE html>
<html lang="ru">
<!-- Screenshot mockup: runs the REAL renderer (dist/bundle.js) with a fake window.lite
     so we can capture the actual UI with invented projects. Not shipped (electron-builder
     files whitelist excludes it). Generate images via scripts/screenshots.sh. -->
<head>
  <meta charset="UTF-8" />
  <title>LiteEditorAI — mock</title>
  <link rel="stylesheet" href="dist/bundle.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <span class="brand"><span class="brand-mark">▍</span>LiteEditorAI</span>
      <nav id="menubar">
        <button class="menu-item" data-menu="file">Файл</button>
        <button class="menu-item" data-menu="settings">Настройки</button>
        <button class="menu-item" data-menu="about">О&nbsp;программе</button>
      </nav>
      <div class="drag-space"></div>
      <div class="win-tools">
        <button id="attention-badge" class="attention-badge" title="Агентов ждёт ответа">0</button>
        <button id="btn-single" class="icon-btn" title="Один терминал (Ctrl+\)">⛶</button>
        <span class="win-sep"></span>
        <button id="win-min" class="win-btn"></button>
        <button id="win-max" class="win-btn"></button>
        <button id="win-full" class="win-btn"></button>
        <button id="win-close" class="win-btn close"></button>
      </div>
    </header>

    <div id="body">
      <aside id="mini-rail"></aside>
      <aside id="sidebar">
        <div class="pane-head">ПРОЕКТЫ</div>
        <button id="open-folder-btn" class="open-folder">+ Открыть папку</button>
        <div id="projects"></div>
      </aside>
      <div class="gutter" data-resize="sidebar"></div>

      <section id="terminal-pane">
        <div id="terminals"></div>
        <div id="term-tools">
          <button id="term-clear" class="tt-btn" title="Очистить терминал">🧹</button>
          <button id="term-restart" class="tt-btn" title="Перезапустить терминал">⟳</button>
        </div>
        <div id="term-search">
          <input id="term-search-input" type="text" placeholder="Поиск в терминале…">
          <button id="term-search-prev" class="ts-btn">▲</button>
          <button id="term-search-next" class="ts-btn">▼</button>
          <button id="term-search-close" class="ts-btn">✕</button>
        </div>
        <div id="empty-hint">
          <div class="hint-card"><div class="hint-title">Пусто</div>
            <div class="hint-text">Открой папку слева — справа поднимется её терминал.</div></div>
        </div>
      </section>

      <div class="gutter gutter-v hidden" data-resize="viewer"></div>
      <section id="viewer-pane" class="hidden">
        <div class="pane-head">
          <span id="viewer-filename">—</span>
          <span id="viewer-dirty" class="dirty-dot"></span>
          <div class="drag-space-static"></div>
          <button id="viewer-preview" class="icon-btn" title="Превью">👁</button>
          <button id="viewer-diff" class="icon-btn" title="Дифф">±</button>
          <button id="viewer-save" class="icon-btn" title="Сохранить">💾</button>
          <button id="viewer-close" class="icon-btn" title="Закрыть">✕</button>
        </div>
        <div id="editor"></div>
        <div id="diff-view"></div>
        <div id="preview-view"></div>
      </section>

      <div class="gutter gutter-v hidden" data-resize="tree"></div>
      <section id="tree-pane" class="hidden">
        <div class="pane-head">
          <span id="tree-title">ДЕРЕВО</span>
          <div class="drag-space-static"></div>
          <button id="tree-new" class="icon-btn">＋</button>
          <button id="tree-refresh" class="icon-btn">⟳</button>
        </div>
        <div id="tree"></div>
      </section>
    </div>
  </div>

  <div id="menu-layer"></div>
  <div id="modal-root"></div>
  <div id="toasts"></div>

  <script src="mock-lite.js"></script>
  <script src="dist/bundle.js"></script>
</body>
</html>
