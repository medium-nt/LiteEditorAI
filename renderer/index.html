<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: file: https: http:; frame-src 'self' file:;" />
  <title>LiteEditorAI</title>
  <link rel="stylesheet" href="dist/bundle.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="neumorphism">
  <div id="app">
    <!-- Custom frameless titlebar: menu (left) + window controls (right). Draggable. -->
    <header id="topbar">
      <span class="brand"><span class="brand-mark">▍</span>LiteEditorAI</span>
      <nav id="menubar">
        <button class="menu-item" data-menu="file">Файл</button>
        <button class="menu-item" data-menu="settings">Настройки</button>
        <button class="menu-item" data-menu="modules">Модули</button>
        <button class="menu-item" data-menu="about">О&nbsp;программе</button>
      </nav>
      <div class="drag-space"></div>
      <div class="win-tools">
        <button id="attention-badge" class="attention-badge" title="Агентов ждёт ответа">0</button>
        <button id="pult-badge" class="pult-badge" title="Подключённые пульты" hidden></button>
        <span id="app-ver" class="app-ver" title="Версия приложения"></span>
        <button id="update-badge" class="update-badge" title="Доступна новая версия — открыть страницу загрузки" hidden></button>
        <button id="btn-single" class="icon-btn" title="Один терминал (Ctrl+\)" data-icon="columns"></button>
        <span class="win-sep"></span>
        <button id="win-min" class="win-btn" title="Свернуть" aria-label="Свернуть"></button>
        <button id="win-max" class="win-btn" title="Развернуть" aria-label="Развернуть"></button>
        <button id="win-close" class="win-btn close" title="Закрыть" aria-label="Закрыть"></button>
      </div>
    </header>

    <div id="body">
      <!-- compact project switcher, shown only in single-terminal mode -->
      <aside id="mini-rail"></aside>

      <aside id="sidebar">
        <div class="pane-head">ПРОЕКТЫ</div>
        <div id="projects"></div>
      </aside>
      <div class="gutter" data-resize="sidebar"></div>

      <section id="terminal-pane">
        <div id="term-header">
          <div id="term-tabs"></div>
          <div id="term-tools">
            <button id="term-clear" class="tt-btn" title="Очистить терминал" data-icon="eraser" data-icon-size="15"></button>
            <button id="term-restart" class="tt-btn" title="Перезапустить терминал" data-icon="refresh" data-icon-size="15"></button>
          </div>
        </div>
        <div id="term-body">
        <div id="terminals"></div>
        <div id="term-search">
          <input id="term-search-input" type="text" placeholder="Поиск в терминале…" autocomplete="off" spellcheck="false">
          <button id="term-search-prev" class="ts-btn" title="Назад (Shift+Enter)" data-icon="chevron-up" data-icon-size="14"></button>
          <button id="term-search-next" class="ts-btn" title="Вперёд (Enter)" data-icon="chevron-down" data-icon-size="14"></button>
          <button id="term-search-close" class="ts-btn" title="Закрыть (Esc)" data-icon="x" data-icon-size="14"></button>
        </div>
        <div id="empty-hint">
          <div class="hint-card">
            <div class="hint-title">Пусто</div>
            <div class="hint-text">Открой папку слева — справа поднимется её терминал.</div>
          </div>
        </div>
        <!-- OpenRouter chat: shown instead of the terminal when an OpenRouter card is active -->
        <div id="chat-pane" class="hidden">
          <div id="chat-top">
            <span id="chat-title" class="chat-title"></span>
            <div id="chat-session-wrap" class="chat-session-wrap">
              <button id="chat-session-btn" class="chat-session-btn" type="button" title="Сессии этого ключа">☰ Сессия 1</button>
              <div id="chat-session-pop" class="chat-session-pop hidden"></div>
            </div>
            <div id="chat-model-wrap" class="chat-model-wrap">
              <button id="chat-model-btn" class="chat-model-btn" type="button">Выбрать модель…</button>
              <div id="chat-model-pop" class="chat-model-pop hidden">
                <input id="chat-model-search" type="text" placeholder="Поиск модели…" autocomplete="off" spellcheck="false">
                <div id="chat-model-list" class="chat-model-list"></div>
              </div>
            </div>
            <div class="chat-ctx" title="Сколько последних сообщений отправлять модели (1–100)">
              <label for="chat-ctx-input">контекст</label>
              <input id="chat-ctx-input" type="number" min="1" max="100" value="10">
            </div>
          </div>
          <div id="chat-log" class="chat-log"></div>
          <div id="chat-input-row" class="chat-input-row">
            <textarea id="chat-input" rows="1" placeholder="Сообщение…  (Enter — отправить, Shift+Enter — перенос строки)" spellcheck="false"></textarea>
            <button id="chat-send" class="btn primary chat-send" type="button" title="Отправить">▶</button>
          </div>
        </div>
        <!-- Обработка текста: документ вместо терминала (как чат OpenRouter). Модуль renderer/textproc.js -->
        <div id="doc-pane" class="hidden">
          <div id="doc-toolbar">
            <span id="doc-title" class="doc-title"></span>
            <div id="doc-modes" class="doc-modes"></div>
            <div class="doc-tools-space"></div>
            <span id="doc-saved" class="doc-saved"></span>
          </div>
          <div id="doc-body" class="doc-body">
            <div id="doc-editor" class="doc-editor"></div>
            <div id="doc-preview" class="doc-preview prev-md" style="display:none"></div>
            <button id="doc-ai-btn" class="doc-ai-btn" type="button" style="display:none">✦ AI</button>
          </div>
        </div>
        </div>
      </section>

      <!-- system/scratch terminal: own PTY at home dir, not tied to any project -->
      <div id="gutter-scratch" class="gutter gutter-scratch hidden" data-resize="scratch"></div>
      <section id="scratch-pane" class="hidden">
        <div class="pane-head">
          <span>СИСТЕМА · ~</span>
          <div class="drag-space-static"></div>
          <button id="scratch-restart" class="icon-btn" title="Перезапустить активную вкладку (новый шелл в ~)" data-icon="refresh"></button>
          <button id="scratch-close" class="icon-btn" title="Закрыть модуль" data-icon="x"></button>
        </div>
        <div id="scratch-tabs" class="term-tabs scratch-tabs"></div>
        <div id="scratch-term"></div>
      </section>

      <!-- Git module: opens to the right of the terminal (PhpStorm-style), one project at a time -->
      <div id="gutter-git" class="gutter hidden" data-resize="git"></div>
      <section id="git-pane" class="hidden">
        <div class="pane-head">
          <span id="git-proj">Git</span>
          <div class="drag-space-static"></div>
          <button id="git-refresh" class="icon-btn" title="Обновить" data-icon="refresh"></button>
          <button id="git-close" class="icon-btn" title="Закрыть Git" data-icon="x"></button>
        </div>
        <div id="git-body" class="git-body"></div>
      </section>

      <!-- Containers module (docker/podman): system-wide, opens to the right -->
      <div id="gutter-docker" class="gutter hidden" data-resize="docker"></div>
      <section id="docker-pane" class="hidden">
        <div class="pane-head">
          <span id="docker-title">Контейнеры</span>
          <div class="drag-space-static"></div>
          <button id="docker-refresh" class="icon-btn" title="Обновить" data-icon="refresh"></button>
          <button id="docker-close" class="icon-btn" title="Закрыть" data-icon="x"></button>
        </div>
        <div id="docker-tabs" class="docker-tabs"></div>
        <div id="docker-body" class="docker-body"></div>
      </section>

      <!-- Databases module (Postgres/MySQL/SQLite): system-wide, opens to the right -->
      <div id="gutter-db" class="gutter hidden" data-resize="db"></div>
      <section id="db-pane" class="hidden">
        <div class="pane-head">
          <span id="db-title">Базы данных</span>
          <div class="drag-space-static"></div>
          <button id="db-refresh" class="icon-btn" title="Обновить" data-icon="refresh"></button>
          <button id="db-close" class="icon-btn" title="Закрыть" data-icon="x"></button>
        </div>
        <div id="db-body" class="db-body"></div>
      </section>

      <!-- RemoteHost module (SSH-сессии к серверам/хостингам): system-wide, opens to the right -->
      <div id="gutter-rh" class="gutter hidden" data-resize="rh"></div>
      <section id="rh-pane" class="hidden">
        <div class="pane-head">
          <span id="rh-title">Удалённые хосты</span>
          <div class="drag-space-static"></div>
          <button id="rh-back" class="icon-btn" title="К списку подключений" data-icon="chevron-left" style="display:none"></button>
          <button id="rh-refresh" class="icon-btn" title="Обновить список" data-icon="refresh"></button>
          <button id="rh-close" class="icon-btn" title="Закрыть модуль" data-icon="x"></button>
        </div>
        <div id="rh-tabs" class="term-tabs rh-tabs" style="display:none"></div>
        <div id="rh-conns" class="db-body"></div>
        <div id="rh-term" style="display:none"></div>
      </section>

      <div class="gutter gutter-v hidden" data-resize="viewer"></div>
      <section id="viewer-pane" class="hidden">
        <div class="pane-head">
          <span id="viewer-filename">—</span>
          <span id="viewer-dirty" class="dirty-dot" title="Несохранённые изменения"></span>
          <div class="drag-space-static"></div>
          <button id="viewer-minimap" class="icon-btn" title="Миникарта кода (вкл/выкл)" data-icon="columns"></button>
          <button id="viewer-preview" class="icon-btn" title="Превью (Markdown / картинка / HTML)" data-icon="eye"></button>
          <button id="viewer-full" class="icon-btn" title="Развернуть превью HTML на весь экран (Esc — выход)" style="display:none" data-icon="maximize"></button>
          <button id="viewer-diff" class="icon-btn" title="Дифф изменений vs HEAD (git)" data-icon="diff"></button>
          <button id="viewer-save" class="icon-btn" title="Сохранить (Ctrl+S)" data-icon="save"></button>
          <button id="viewer-close" class="icon-btn" title="Закрыть вивер" data-icon="x"></button>
        </div>
        <div id="editor"></div>
        <div id="diff-view"></div>
        <div id="preview-view"></div>
      </section>

      <div class="gutter gutter-v hidden" data-resize="tree"></div>
      <section id="tree-pane" class="hidden">
        <div class="pane-head">
          <span id="tree-title">ДЕРЕВО</span>
          <div class="drag-space-static"></div>
          <button id="tree-new" class="icon-btn" title="Создать файл/папку в корне проекта" data-icon="plus"></button>
          <button id="tree-refresh" class="icon-btn" title="Обновить дерево файлов" data-icon="refresh"></button>
        </div>
        <div id="tree"></div>
      </section>
    </div>
  </div>

  <div id="menu-layer"></div>
  <div id="modal-root"></div>
  <div id="toasts"></div>

  <script src="dist/bundle.js"></script>
</body>
</html>
