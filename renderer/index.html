<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' file: blob:; img-src 'self' data: file: https: http:; frame-src 'self' file:;" />
  <title>LiteEditorAI</title>
  <link rel="stylesheet" href="dist/bundle.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="neumorphism">
  <div id="app">
    <!-- Custom frameless titlebar: menu (left) + window controls (right). Draggable. -->
    <!-- Заставка «матрица»: полноэкранный canvas-оверлей (вкл кнопкой/по бездействию). -->
    <canvas id="matrix-overlay" class="hidden" aria-hidden="true"></canvas>
    <header id="topbar">
      <span class="brand"><span class="brand-mark">▍</span>LiteEditorAI</span>
      <nav id="menubar">
        <button class="menu-item" data-menu="file">Файл</button>
        <button class="menu-item" data-menu="settings">Настройки</button>
        <button class="menu-item" data-menu="modules">Модули</button>
        <button class="menu-item" data-menu="about">О&nbsp;программе</button>
      </nav>
      <div class="drag-space"></div>
      <div class="win-tools">
        <button id="pomo-mini" class="pomo-mini" title="Помодоро — открыть пульт" hidden></button>
        <button id="attention-badge" class="attention-badge" title="Агентов ждёт ответа">0</button>
        <button id="pult-badge" class="pult-badge" title="Подключённые пульты" hidden></button>
        <span id="app-ver" class="app-ver" title="Версия приложения"></span>
        <button id="update-badge" class="update-badge" title="Доступна новая версия — открыть страницу загрузки" hidden></button>
        <button id="btn-single" class="icon-btn" title="Один терминал (Ctrl+\)" data-icon="columns"></button>
        <button id="btn-matrix" class="icon-btn" title="Заставка «матрица» (вкл/выкл)" data-icon="sparkles"></button>
        <span class="win-sep"></span>
        <button id="win-min" class="win-btn min" title="Свернуть" aria-label="Свернуть"></button>
        <button id="win-max" class="win-btn max" title="Развернуть" aria-label="Развернуть"></button>
        <button id="win-close" class="win-btn close" title="Закрыть" aria-label="Закрыть"></button>
      </div>
    </header>

    <div id="body">
      <!-- compact project switcher, shown only in single-terminal mode -->
      <aside id="mini-rail"></aside>

      <aside id="sidebar">
        <div class="pane-head">ПРОЕКТЫ</div>
        <div id="projects"></div>
      </aside>
      <div class="gutter" data-resize="sidebar"></div>

      <section id="terminal-pane">
        <div id="term-header">
          <div id="term-tabs"></div>
          <div id="term-tools">
            <button id="term-clear" class="tt-btn" title="Очистить терминал" data-icon="eraser" data-icon-size="15"></button>
            <button id="term-restart" class="tt-btn" title="Перезапустить терминал" data-icon="refresh" data-icon-size="15"></button>
          </div>
        </div>
        <div id="term-body">
        <div id="terminals"></div>
        <div id="term-search">
          <input id="term-search-input" type="text" placeholder="Поиск в терминале…" autocomplete="off" spellcheck="false">
          <button id="term-search-prev" class="ts-btn" title="Назад (Shift+Enter)" data-icon="chevron-up" data-icon-size="14"></button>
          <button id="term-search-next" class="ts-btn" title="Вперёд (Enter)" data-icon="chevron-down" data-icon-size="14"></button>
          <button id="term-search-close" class="ts-btn" title="Закрыть (Esc)" data-icon="x" data-icon-size="14"></button>
        </div>
        <div id="empty-hint">
          <div class="hint-card">
            <div class="hint-title">Пусто</div>
            <div class="hint-text">Открой папку слева — справа поднимется её терминал.</div>
          </div>
        </div>
        </div>
        <!-- quickbar: полоса быстрого доступа к модулям (Модули → Настройка панели…) -->
        <div id="quickbar" class="hidden"></div>
      </section>

      <!-- Системный терминал («Система · ~») — мигрирован в отдельное окно (renderer/module.html). -->

      <!-- Git module («Git») — мигрирован в отдельное окно (renderer/module.html). -->

      <!-- «Контекст» module («Контекст») — мигрирован в отдельное окно (renderer/module.html). -->

      <!-- Notes/tasks module («Задачи») — мигрирован в отдельное окно (renderer/module.html). -->

      <!-- Audit module («Аудит») — мигрирован в отдельное окно (renderer/module.html). -->

      <!-- Tools module («Инструменты») — мигрирован в отдельное окно (renderer/module.html). -->

      <!-- IterFlow и WEB/SEO аудит — мигрированы в отдельные окна (renderer/module.html). -->

      <!-- Containers («Контейнеры»), Databases («Базы данных»), RemoteHost («Удалённые хосты»),
           OpenRouter chat и «Обработка текста» — мигрированы в отдельные окна (renderer/module.html). -->

      <!-- User modules (extensions): общая панель правого слота, один пользовательский модуль за раз -->
      <div id="gutter-ext" class="gutter hidden" data-resize="ext"></div>
      <section id="ext-pane" class="hidden">
        <div class="pane-head">
          <button id="ext-back" class="icon-btn" title="Назад к модулям" data-icon="chevron-left" style="display:none"></button>
          <span id="ext-title">Модуль</span>
          <div class="drag-space-static"></div>
          <button id="ext-reload" class="icon-btn" title="Перезагрузить модуль (после правок кода)" data-icon="refresh"></button>
          <button id="ext-close" class="icon-btn" title="Закрыть" data-icon="x"></button>
        </div>
        <div id="ext-body" class="ext-body"></div>
      </section>

      <!-- Вивер кода (#viewer-pane) и дерево файлов (#tree-pane) переехали в окно модуля (module.html#files). -->
    </div>
  </div>

  <div id="menu-layer"></div>
  <div id="modal-root"></div>
  <div id="toasts"></div>

  <script src="dist/bundle.js"></script>
</body>
</html>
