<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>LiteEditor Пульт</title>
  <!-- ES5-маяк: работает ДО и НЕЗАВИСИМО от app.js. Шлёт пинг «страница загрузилась»
       и ловит любые ошибки бандла (включая SyntaxError при парсинге) → таблица reports.
       Так мы видим причину «тишины»/чёрного экрана, даже если основной JS не исполняется. -->
  <script>
  (function () {
    // Хост релея больше не зашит — берём сохранённый пользователем (self-hosting).
    var RELAY = '';
    try { var h = localStorage.getItem('lite_relay'); if (h) RELAY = h; } catch (e) {}
    function report(kind, msg, detail) {
      if (!RELAY) return;   // нет настроенного релея — некуда репортить (до первого входа)
      try {
        var w = new WebSocket(RELAY + '?role=app');
        w.onopen = function () {
          try { w.send(JSON.stringify({ t: 'report', kind: kind, message: String(msg || ''), detail: String(detail || ''), ua: navigator.userAgent })); } catch (e) {}
          setTimeout(function () { try { w.close(); } catch (e) {} }, 1200);
        };
      } catch (e) {}
    }
    window.__report = report;
    window.PULT_VER = '0.60.0';
    window.onerror = function (m, src, line, col, err) {
      report('page-error', m, (err && err.stack) || (src + ':' + line));
      var b = document.getElementById('fatal') || document.createElement('div');
      b.id = 'fatal';
      b.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:99999;background:#5a1620;color:#fff;font:12px monospace;padding:8px;white-space:pre-wrap;max-height:45%;overflow:auto';
      b.textContent = 'Ошибка: ' + m;
      if (document.body) document.body.appendChild(b);
      return false;
    };
    report('page-loaded', 'index.html v0.60.0', navigator.userAgent);
  })();
  </script>
  <link rel="stylesheet" href="./app.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0d1117; color: #d6deeb;
      font-family: -apple-system, Roboto, sans-serif; overflow: hidden; }

    /* Экран входа — виден по умолчанию (JS прячет его при входе в приложение),
       чтобы даже при сбое JS не было пустого «чёрного экрана». */
    #login { display: flex; height: 100%; align-items: center; justify-content: center; }
    .login-box { width: 280px; max-width: 86vw; display: flex; flex-direction: column; gap: 12px; }
    .login-box h1 { font-size: 18px; color: #7fdbca; text-align: center; margin: 0 0 6px; }
    .login-box input { background: #11161d; color: #d6deeb; border: 1px solid #2a323d;
      border-radius: 8px; padding: 12px; font-size: 16px; }
    #lg-go { background: #1f6feb; color: #fff; border: 0; border-radius: 8px; padding: 13px; font-size: 16px; }
    #lg-go:disabled { opacity: .6; }
    #lg-err { color: #f7768e; font-size: 13px; min-height: 16px; text-align: center; }
    .login-note { color: #5a6675; font-size: 12px; text-align: center; }

    /* Основной экран */
    #app { display: none; flex-direction: column; height: 100%; }
    #topbar { display: flex; align-items: center; gap: 10px; padding: 6px 10px; background: #11161d;
      border-bottom: 1px solid #1f2630; position: relative; flex: 0 0 auto; }
    #menu-btn { background: none; border: 0; color: #9fb0c0; font-size: 19px; padding: 0 4px; flex: 0 0 auto; }
    #top-title { display: flex; flex-direction: column; line-height: 1.2; flex: 1; min-width: 0; }
    #top-title .tt-app { font-size: 14px; color: #7fdbca; font-weight: 600; }
    #top-title .tt-who { font-size: 10px; color: #5a6675; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #top-right { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.3; flex: 0 0 auto; }
    #top-status { font-size: 11px; color: #b7c2d0; }
    #top-status.ok { color: #7fdbca; } #top-status.wait { color: #e0af68; } #top-status.bad { color: #f7768e; }
    #top-ver { font-size: 10px; color: #5a6675; }
    /* Шторка-фон для верхних панелей (проекты / меню). */
    #shade { display: none; position: fixed; top: 0; right: 0; bottom: 0; left: 0; z-index: 65;
      background: rgba(0,0,0,.45); }

    /* Проекты и терминалы — ВЕРХНЯЯ ШТОРКА (top sheet) вместо бокового сайдбара:
       вертикальный экран узкий, сайдбар съедал ширину терминала. */
    #projmodal { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 70;
      background: #0e131a; border-bottom: 1px solid #2a3a4a; border-radius: 0 0 14px 14px;
      box-shadow: 0 14px 40px rgba(0,0,0,.6); max-height: 78vh; flex-direction: column; }
    #projmodal .pm-head { display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px 6px; flex: 0 0 auto; }
    #projmodal .pm-title { font-size: 13px; color: #7fdbca; font-weight: 600; }
    #projmodal .pm-x { background: none; border: 0; color: #9fb0c0; font-size: 18px; padding: 0 6px; }
    #tabs { overflow-y: auto; padding: 2px 10px 12px; min-height: 0; }
    .cat { display: flex; align-items: center; gap: 6px; padding: 8px 10px; margin: 6px 0 2px; font-size: 11px;
      color: #e3edf5; text-transform: uppercase; letter-spacing: .5px; cursor: pointer;
      border-left: 3px solid #7fdbca; border-radius: 0 7px 7px 0; }
    .cat .chev { font-size: 9px; opacity: .85; transition: transform .15s; }
    .cat.collapsed .chev { transform: rotate(-90deg); }
    .cat .cat-lbl { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .proj { display: flex; align-items: center; justify-content: space-between; gap: 6px; padding: 6px 4px 6px 12px; }
    .proj-name { font-size: 13px; color: #9fb0c0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .add-term { background: none; border: 0; color: #5f86c7; width: 30px; height: 30px; flex: 0 0 auto;
      display: flex; align-items: center; justify-content: center; border-radius: 6px; padding: 0; }
    .add-term:active { background: #1c2530; color: #8fb4ff; }
    .tab { display: flex; align-items: center; gap: 2px; padding: 9px 4px 9px 26px; font-size: 13px; border-bottom: 1px solid #141a22; color: #b7c2d0; }
    .tab.active { background: #1c2530; color: #7fdbca; border-left: 3px solid #7fdbca; }
    .tab.ghost { opacity: .7; }   /* терминал ещё не открыт на ПК — откроется по тапу */
    .tab-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tab-x { background: none; border: 0; color: #6a7a8c; font-size: 16px; width: 26px; flex: 0 0 auto; }
    .tab-x:active { color: #f7768e; }
    .tab-empty { padding: 12px; font-size: 11px; color: #5a6675; }
    /* Проекты-only: лист дерева — проект (тап = сделать активным). Терминалы ушли в выпадашку. */
    .proj-pick { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid #141a22; color: #b7c2d0; font-size: 14px; }
    .proj-pick.active { background: #1c2530; color: #7fdbca; border-left: 3px solid #7fdbca; padding-left: 9px; }
    .proj-pick .pp-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .proj-pick .pp-count { font-size: 11px; color: #7fdbca; background: #16222e; border-radius: 9px; padding: 1px 7px; flex: 0 0 auto; }

    /* Селектор активного терминала над терминалом + его выпадашка. */
    #termsel { display: flex; align-items: center; gap: 6px; padding: 7px 12px; background: #0e131a;
      border-bottom: 1px solid #1f2630; flex: 0 0 auto; }
    #termsel:active { background: #141c26; }
    #termsel-label { flex: 1; font-size: 13px; color: #cfe3ee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #termsel-chev { font-size: 10px; color: #7fdbca; flex: 0 0 auto; }
    #termdrop { display: none; position: fixed; top: 120px; left: 6px; right: 6px; z-index: 80;
      max-height: 60vh; overflow-y: auto; background: #0e131a; border: 1px solid #2a3a4a; border-radius: 10px;
      box-shadow: 0 12px 36px rgba(0,0,0,.6); padding: 6px; }
    .td-term { display: flex; align-items: center; gap: 2px; padding: 11px 8px; border-bottom: 1px solid #141a22;
      color: #b7c2d0; font-size: 14px; border-radius: 6px; }
    .td-term.active { background: #1c2530; color: #7fdbca; }
    .td-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .td-x { background: none; border: 0; color: #6a7a8c; font-size: 17px; width: 30px; flex: 0 0 auto; }
    .td-x:active { color: #f7768e; }
    .td-new { display: block; width: 100%; text-align: left; background: none; color: #5f86c7; border: 0;
      border-radius: 8px; padding: 11px 8px; font-size: 14px; margin-top: 2px; }
    .td-new:active { background: #1c2530; }
    .td-empty { padding: 12px 8px; color: #5a6675; font-size: 12px; line-height: 1.5; }

    /* Бургер-меню — выпадающий список под шапкой (вместо центральной модалки). */
    #dropmenu { display: none; position: fixed; top: 42px; left: 6px; z-index: 80; width: 280px; max-width: 92vw;
      max-height: 80vh; overflow-y: auto; background: #11161d; border: 1px solid #2a3a4a; border-radius: 10px;
      box-shadow: 0 12px 36px rgba(0,0,0,.6); padding: 6px; }
    #dropmenu .dm-sect { font-size: 10px; letter-spacing: .6px; text-transform: uppercase; color: #7fdbca; margin: 8px 6px 3px; }
    #dropmenu button { display: block; width: 100%; text-align: left; background: none; color: #d6deeb;
      border: 0; border-radius: 8px; padding: 10px; font-size: 14px; }
    #dropmenu button:active { background: #1c2530; }

    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
    /* Тулбар в два ряда: первый — три главные кнопки во всю ширину поровну,
       второй — спецклавиши (переносятся при нехватке места). */
    #termbar { display: flex; flex-direction: column; gap: 4px; padding: 5px 6px; background: #11161d; border-bottom: 1px solid #1f2630; flex: 0 0 auto; }
    .tb-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .tk { background: #1c2530; color: #cfe3ee; border: 1px solid #2a323d; border-radius: 6px; padding: 6px 11px; font-size: 12px; white-space: nowrap; flex: 0 0 auto; }
    .tk:active { background: #27323f; }
    .tk-big { flex: 1 1 0; padding: 9px 6px; font-size: 13px; text-align: center; }
    #term { flex: 1; min-height: 0; padding: 4px; overflow: hidden; }
    /* Поверхность «проекции экрана»: кадр с ПК — простой текст. Широкая сетка ПК
       переносится (pre-wrap) и кадр выше экрана планшета → локальный скролл с
       прилипанием к низу (низ кадра = поле ввода агента, оно важнее всего).
       Прокрутка СОДЕРЖИМОГО агента (его транскрипт в TUI) — кнопки PgUp/PgDn. */
    #term .screen { margin: 0; width: 100%; height: 100%; overflow-y: auto; white-space: pre-wrap;
      word-break: break-word; overflow-wrap: anywhere; color: #d6deeb; background: #0d1117;
      font: 12px/1.35 ui-monospace, 'Roboto Mono', 'Droid Sans Mono', monospace; padding: 7px; touch-action: pan-y; }
    #term .screen::-webkit-scrollbar { width: 8px; }
    #term .screen::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 6px; }
    #term .screen::-webkit-scrollbar-track { background: transparent; }
    /* Строка с курсором (поле ввода агента) — выделяем цветом, чтобы глаз сразу находил. */
    #term .screen .cur-line { background: #16243a; color: #eaf2fb; border-radius: 3px; }
    .tk.on { background: #1f6feb; color: #fff; border-color: #1f6feb; }

    /* Своя экранная клавиатура — ПЛАВАЮЩЕЕ перетаскиваемое окно (не ужимает терминал,
       поэтому шрифт терминала остаётся крупным). Компактное: ширина ~320px, мелкие клавиши. */
    #kbd { --kbs: 1; display: none; position: fixed; z-index: 90; flex-direction: column;
      width: 320px; max-width: 96vw; padding: 5px; background: #0b0f14;
      border: 1px solid #2a3a4a; border-radius: 10px; box-shadow: 0 10px 34px rgba(0,0,0,.55); }
    #kbd-head { display: flex; align-items: center; gap: 8px; justify-content: space-between;
      padding: 1px 4px 6px; cursor: move; touch-action: none; }
    #kbd-head .t { font-size: 13px; color: #7fdbca; flex: 0 0 auto; }
    #kbd-head .x { background: none; border: 0; color: #9fb0c0; font-size: 17px; padding: 0 4px; flex: 0 0 auto; }
    #kbd-scale { display: flex; gap: 3px; flex: 1; justify-content: center; }
    #kbd-scale button { background: #1c2530; color: #9fb0c0; border: 1px solid #2a323d; border-radius: 5px;
      font-size: 10px; padding: 3px 6px; }
    #kbd-scale button.on { background: #1f6feb; color: #fff; border-color: #1f6feb; }
    #kbd-keys { display: flex; flex-direction: column; gap: 4px; }
    .kb-row { display: flex; gap: 4px; }
    .kb-key { flex: 1; min-width: 0; height: calc(30px * var(--kbs)); background: #1c2530; color: #e3edf5;
      border: 1px solid #2a323d; border-radius: 6px; font-size: calc(14px * var(--kbs)); padding: 0;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .kb-key:active { background: #2c3a48; }
    .kb-key.kb-wide { flex: 1.5; font-size: calc(11px * var(--kbs)); }
    .kb-key.kb-space { flex: 4; font-size: calc(11px * var(--kbs)); color: #9fb0c0; }

    /* Компактный «хром» на низких экранах (ориентация залочена в портрет, но на всякий
       случай — маленькие устройства): отвоёвываем вертикаль под терминал. */
    @media (max-height: 480px) {
      #topbar { padding: 2px 8px; }
      #top-title { flex-direction: row; align-items: baseline; gap: 6px; }
      #top-title .tt-app { font-size: 12px; }
      #top-title .tt-who { display: none; }
      #top-right { flex-direction: row; align-items: baseline; gap: 8px; }
      #top-status { font-size: 10px; }
      #top-ver { display: none; }
      #termbar { padding: 2px 4px; gap: 4px; }
      .tk { padding: 4px 7px; font-size: 11px; }
      #termsel { padding: 3px 8px; }
      #termsel-label { font-size: 12px; }
      #term { padding: 2px; }
    }
  </style>
</head>
<body>
  <!-- Экран входа -->
  <div id="login">
    <div class="login-box">
      <h1>LiteEditor Пульт</h1>
      <input id="lg-host" placeholder="Хост релея (relay.example.com)" autocapitalize="off" autocorrect="off" inputmode="url" />
      <input id="lg-login" placeholder="Логин" autocapitalize="off" autocorrect="off" />
      <input id="lg-pass" type="password" placeholder="Пароль" />
      <div id="lg-err"></div>
      <button id="lg-go">Войти</button>
      <div class="login-note">Укажите хост своего релея. Регистрация аккаунта — в редакторе на ПК (меню «Пульт»).</div>
      <div class="login-note" id="login-ver" style="opacity:.6">пульт v0.60.0</div>
    </div>
  </div>

  <!-- Основной экран -->
  <div id="app">
    <div id="topbar">
      <button id="menu-btn" title="Меню">☰</button>
      <div id="top-title">
        <span class="tt-app">LiteEditor</span>
        <span class="tt-who" id="whoami"></span>
      </div>
      <div id="top-right">
        <span id="top-status">…</span>
        <span id="top-ver"></span>
      </div>
    </div>
    <div id="main">
      <div id="termbar">
        <div class="tb-row">
          <button class="tk tk-big" data-key="side" title="Проекты и терминалы">📁 Проекты</button>
          <button class="tk tk-big" data-key="kbd" title="Клавиатура">⌨ Клава</button>
          <button class="tk tk-big" data-key="tasks" title="Задачи проекта и общие">✓ Задачи</button>
          <button class="tk tk-big" data-key="refresh" title="Обновить экран (свежий кадр с ПК)">⟳ Обновить</button>
        </div>
        <div class="tb-row">
          <button class="tk" data-key="pgup" title="Прокрутка вверх (TUI)">PgUp</button>
          <button class="tk" data-key="pgdn" title="Прокрутка вниз (TUI)">PgDn</button>
          <button class="tk" data-key="c-c">Ctrl+C</button>
          <button class="tk" data-key="esc">Esc</button>
          <button class="tk" data-key="tab">Tab</button>
          <button class="tk" data-key="up">↑</button>
          <button class="tk" data-key="down">↓</button>
          <button class="tk" data-key="enter">⏎</button>
        </div>
      </div>
      <!-- Селектор активного терминала: имя «Проект · Терминал N» + ▾, тап = выпадашка
           терминалов активного проекта (переключение/закрытие/новый). -->
      <div id="termsel"><span id="termsel-label">Выбери проект</span><span id="termsel-chev">▾</span></div>
      <div id="term"></div>
    </div>
    <!-- Шторка-фон + верхняя шторка проектов + выпадашка терминалов + бургер-меню. -->
    <div id="shade"></div>
    <div id="projmodal">
      <div class="pm-head"><span class="pm-title">Проекты</span><button class="pm-x" id="pm-x">✕</button></div>
      <div id="tabs"></div>
    </div>
    <div id="termdrop"></div>
    <div id="dropmenu"></div>
    <!-- Плавающее перетаскиваемое окно своей клавиатуры (поверх всего, с крестиком). -->
    <div id="kbd">
      <div id="kbd-head">
        <span class="t">⌨</span>
        <span id="kbd-scale">
          <button data-s="1">1×</button>
          <button data-s="1.2">1.2×</button>
          <button data-s="1.4">1.4×</button>
          <button data-s="2">2×</button>
        </span>
        <button class="x" id="kbd-x">✕</button>
      </div>
      <div id="kbd-keys"></div>
    </div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
