name: Release

# Builds installers on a pushed tag (v*) and attaches them to the GitHub Release.
# Windows builds on windows-latest, so node-pty compiles natively → working terminal.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: --linux deb
          - os: windows-latest
            target: --win zip
          # macOS собираем ПО-АРХИТЕКТУРНО на РАЗНЫХ раннерах: один arm64-раннер не пересобирает
          # нативный node-pty под x64 → в Intel-сборку попадал arm64-бинарь и терминал не запускался
          # (v1.0.195). Каждый раннер делает `npm ci` под свою арх → pty.node/spawn-helper верной arch.
          - os: macos-14            # Apple Silicon (arm64)
            target: --mac --arm64
          - os: macos-13            # Intel (x64)
            target: --mac --x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps (rebuilds node-pty for this OS)
        run: npm ci

      - name: Bundle renderer
        run: node build.js

      - name: Build installers
        # --publish never: electron-builder только собирает; релиз публикуем шагом ниже
        run: npx --no-install electron-builder ${{ matrix.target }} --publish never

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          prerelease: false                 # помечать как Latest (не Pre-release)
          body_path: RELEASE_NOTES.md        # тело релиза — из файла в репо (единый источник, см. CHANGELOG.md)
          files: |
            dist-release/*.deb
            dist-release/*.zip
            dist-release/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
