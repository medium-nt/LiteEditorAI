name: Release

# Builds installers on a pushed tag (v*) and attaches them to the GitHub Release.
# Windows builds on windows-latest, so node-pty compiles natively → working terminal.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: --linux deb
          - os: windows-latest
            target: --win zip
          # macOS: ОДИН arm64-раннер (macos-14) собирает ОБЕ архитектуры — build.mac.target жёстко задаёт
          # arch:[arm64,x64] для dmg и zip, поэтому `--mac` строит и arm64, и x64 за один проход.
          # Отдельный Intel-раннер (macos-13) УБРАН: он часто висел в очереди GitHub и тормозил весь релиз,
          # а x64-сборка с arm64-раннера и так корректна — загрузчик node-pty (lib/utils.js) при неподходящем
          # build/Release ловит ошибку и падает в апстрим-prebuild prebuilds/darwin-x64 (верный x86_64
          # pty.node + spawn-helper). Проверено на v1.1.32: терминал на Intel работает через этот фолбэк.
          - os: macos-14            # Apple Silicon (arm64) — за один проход собирает arm64 + x64
            target: --mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps (rebuilds node-pty for this OS)
        run: npm ci

      - name: Bundle renderer
        run: node build.js

      - name: Build installers
        # --publish never: electron-builder только собирает; релиз публикуем шагом ниже
        run: npx --no-install electron-builder ${{ matrix.target }} --publish never

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          prerelease: false                 # помечать как Latest (не Pre-release)
          body_path: RELEASE_NOTES.md        # тело релиза — из файла в репо (единый источник, см. CHANGELOG.md)
          files: |
            dist-release/*.deb
            dist-release/*.zip
            dist-release/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
