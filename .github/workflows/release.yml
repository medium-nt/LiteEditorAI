name: Release

# Builds installers on a pushed tag (v*) and attaches them to the GitHub Release.
# Windows builds on windows-latest, so node-pty compiles natively → working terminal.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: --linux deb
          - os: windows-latest
            target: --win zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps (rebuilds node-pty for this OS)
        run: npm ci

      - name: Bundle renderer
        run: node build.js

      - name: Build installers
        # --publish never: electron-builder только собирает; релиз публикуем шагом ниже
        run: npx --no-install electron-builder ${{ matrix.target }} --publish never

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          prerelease: true
          body: |
            **LiteEditorAI — alpha.** Лёгкий редактор для работы с ИИ-агентами в терминале.

            ### Что скачать
            - 🐧 **`.deb`** — Ubuntu / Debian (x64). Установка: `sudo apt install ./LiteEditorAI_*.deb`, затем иконка **LiteEditorAI** в меню.
            - 🪟 **`.zip`** — Windows (x64), portable: распакуй и запусти `LiteEditorAI.exe` (установка не нужна).

            Это alpha — терминалы не переживают перезапуск. Баги и идеи → Issues.
          files: |
            dist-release/*.deb
            dist-release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
